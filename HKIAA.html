<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKIAA Pre-solo Aeronautical Knowledge Test</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f8; color: #333; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-box { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #003366; padding-bottom: 15px; margin-bottom: 30px; }
        h1 { color: #003366; margin: 0; font-size: 1.5rem; }
        .lang-toggle { background: #003366; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .info-section { background-color: #e8f4fd; padding: 20px; border-radius: 8px; margin-bottom: 30px; border-left: 5px solid #003366; }
        .question-card { margin-bottom: 25px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; background-color: #fff; }
        .tag { display: inline-block; background-color: #e8f0fe; color: #1967d2; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 8px; font-weight: bold; }
        .options label { display: block; padding: 12px 15px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; }
        .btn-submit { display: block; width: 100%; padding: 15px; background-color: #003366; color: white; font-size: 1.1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #result-area { display: none; margin-top: 30px; padding: 30px; border: 2px solid #003366; border-radius: 10px; text-align: center; }
        .score-num { font-size: 3rem; font-weight: bold; color: #d32f2f; }
        .analysis-box { background: #f8f9fa; padding: 20px; border-radius: 10px; text-align: left; margin-top: 20px; }
        .progress-container { height: 12px; background: #e9ecef; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; transition: width 1s; }
        .correct-bg { background-color: #d4edda !important; border-color: #28a745 !important; }
        .wrong-bg { background-color: #f8d7da !important; border-color: #dc3545 !important; }
        .feedback { display: none; margin-top: 10px; padding: 10px; border-radius: 4px; font-size: 0.9rem; background: #f1f1f1; border-left: 4px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1 id="ui-title">✈️ HKIAA 学员单飞前必知必会测验</h1>
        <button class="lang-toggle" onclick="toggleLang()">English / 中文</button>
    </div>
    <div class="subtitle" id="ui-subtitle">广汉分院 SR20 专用 · 随机 20 题 · 16 题合格</div>
    
    <div class="info-section">
        <label id="ui-name-label" style="font-weight:bold; color:#003366">学员姓名:</label>
        <input type="text" id="studentName" style="width:60%; padding:8px; margin-left:10px">
    </div>

    <form id="quiz-form"></form>

    <button type="button" class="btn-submit" id="ui-submit-btn" onclick="submitQuiz()">提交并分析 / Submit & Analyze</button>

    <div id="result-area">
        <div id="res-name" style="font-size: 1.4rem; font-weight: bold;"></div>
        <div class="score-num" id="score-display">0 / 20</div>
        <div id="res-msg" style="font-weight: bold; margin: 10px 0;"></div>
        
        <div class="analysis-box">
            <h3 id="ui-analysis-title">📊 板块缺陷分析 / Analysis</h3>
            <div id="analysis-content"></div>
        </div>
        <button onclick="window.location.reload()" style="margin-top:20px; padding:10px; cursor:pointer">Restart / 重新测验</button>
    </div>
</div>

<script>
    let currentLang = 'zh';
    const i18n = {
        zh: {
            title: "✈️ HKIAA 学员单飞前必知必会测验",
            subtitle: "广汉分院 SR20 专用 · 随机 20 题 · 16 题合格",
            nameLabel: "学员姓名:",
            submitBtn: "提交并分析 (Submit)",
            analysisTitle: "📊 板块缺陷分析",
            pass: "PASS 合格！您已具备单飞理论基础。",
            fail: "FAIL 未通过！请重点复习对应板块。",
            cat1: "资质与规章", cat2: "本场程序与天气", cat3: "机型性能与系统", cat4: "应急处置与人为因素"
        },
        en: {
            title: "✈️ HKIAA Pre-solo Knowledge Test",
            subtitle: "SR20 ZUGH Only · 20 Questions · 80% to Pass",
            nameLabel: "Student Name:",
            submitBtn: "Submit & Analyze",
            analysisTitle: "📊 Performance Analysis",
            pass: "PASS! You are ready for the first solo flight.",
            fail: "FAIL! Review the categories marked in red.",
            cat1: "Regs & Qualifications", cat2: "Procedures & Weather", cat3: "Performance & Systems", cat4: "Emergency & Human Factors"
        }
    };

    const pool = [
        // 板块 1
        { cat: "cat1", 
          zh: { q: "香港学员实施首次单飞前的飞机训练时间（含技术检查）至少达到多少小时？", opts: ["20.5h", "23.5h", "25h", "29h"], r: "依据：广汉分院管理程序规定，香港学员最低单飞经历为 23.5 小时 [cite: 1, 6]。" },
          en: { q: "What is the minimum flight time required for HK students before the first solo (including flight check)?", opts: ["20.5h", "23.5h", "25h", "29h"], r: "Reference: Minimum 23.5 flight hours required per ZUGH training program[cite: 1, 6]." },
          ans: 1 },
        { cat: "cat1", 
          zh: { q: "首次单飞前，在飞机上的着陆次数累计不得少于多少次？", opts: ["50次", "60次", "70次", "80次"], r: "依据：单飞前飞机上着陆次数不少于 70 次 [cite: 1, 6]。" },
          en: { q: "What is the minimum number of landings required before the first solo?", opts: ["50", "60", "70", "80"], r: "Reference: At least 70 landings in the aircraft are required[cite: 1, 6]." },
          ans: 2 },
        // 板块 3 - 进近速度
        { cat: "cat3", 
          zh: { q: "SR20 在无襟翼（0% Flaps）着陆时的最后进近建议速度是多少？", opts: ["80 KIAS", "84 KIAS", "89 KIAS", "95 KIAS"], r: "SR20 机型数据：无襟翼建议进近速度为 89 节。" },
          en: { q: "What is the recommended final approach speed for SR20 with 0% Flaps?", opts: ["80 KIAS", "84 KIAS", "89 KIAS", "95 KIAS"], r: "SR20 Performance: 89 KIAS is recommended for 0% flaps." },
          ans: 2 },
        { cat: "cat3", 
          zh: { q: "SR20 在起飞/进近位襟翼（50% Flaps）着陆时的最后进近建议速度是多少？", opts: ["78 KIAS", "80 KIAS", "84 KIAS", "89 KIAS"], r: "SR20 机型数据：50% 襟翼建议进近速度为 84 节。" },
          en: { q: "What is the recommended final approach speed for SR20 with 50% Flaps?", opts: ["78 KIAS", "80 KIAS", "84 KIAS", "89 KIAS"], r: "SR20 Performance: 84 KIAS is recommended for 50% flaps." },
          ans: 2 }
        // ... 此处应补全 50 题逻辑，为了篇幅示例 4 题的核心结构
    ];

    let currentTest = [];

    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        updateUI();
        render();
    }

    function updateUI() {
        const str = i18n[currentLang];
        document.getElementById('ui-title').innerText = str.title;
        document.getElementById('ui-subtitle').innerText = str.subtitle;
        document.getElementById('ui-name-label').innerText = str.nameLabel;
        document.getElementById('ui-submit-btn').innerText = str.submitBtn;
        document.getElementById('ui-analysis-title').innerText = str.analysisTitle;
    }

    function initTest() {
        // 实际应用时需在这里编写从50题Pool中分类抽取20题的逻辑
        // 为演示逻辑，直接使用 pool 中所有题
        currentTest = JSON.parse(JSON.stringify(pool)); 
        updateUI();
        render();
    }

    function render() {
        const form = document.getElementById('quiz-form');
        form.innerHTML = '';
        currentTest.forEach((item, i) => {
            const content = item[currentLang];
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div class="tag">${i18n[currentLang][item.cat]}</div>
                <div class="question-text">${i + 1}. ${content.q}</div>
                <div class="options">
                    ${content.opts.map((o, oi) => `
                        <label id="q${i}_o${oi}"><input type="radio" name="q${i}" value="${oi}"> ${String.fromCharCode(65+oi)}. ${o}</label>
                    `).join('')}
                </div>
                <div class="feedback" id="fb${i}"></div>
            `;
            form.appendChild(card);
        });
    }

    function submitQuiz() {
        // 评分逻辑与分析逻辑同前...
        const name = document.getElementById('studentName').value;
        if(!name) return alert(currentLang === 'zh' ? "请输入姓名" : "Enter Name");
        // (评分代码此处略，主要展示切换架构)
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('score-display').innerText = "Test Mode";
    }

    window.onload = initTest;
</script>
</body>
</html>
